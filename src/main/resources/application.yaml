spring:
  application:
    name: InventoryApp

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/inventory_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate       # 운영: validate (스키마 자동 변경 금지)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${SERVER_PORT:8080}

# Actuator (ALB 헬스 체크)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 로깅
logging:
  level:
    root: INFO
    com.example: DEBUG
